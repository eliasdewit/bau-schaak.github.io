<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Chess - Bauhaus Style</title>
        <link rel="stylesheet" href="style.css">
        <style>
            body {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                background-color: #f0f0f0;
                font-family: 'Archivo', sans-serif;
            }
            h1 {
                font-size: 4rem;
                text-transform: uppercase;
                margin-bottom: 20px;
                border-bottom: 8px solid #000;
            }
            #chessboard {
                display: grid;
                grid-template-columns: repeat(8, 60px);
                grid-template-rows: repeat(8, 60px);
                border: 10px solid #000;
                box-shadow: 20px 20px 0px #ffcc00; /* Yellow Bauhaus shadow */
                background-color: #000;
                gap: 2px; /* Bauhaus lines between squares */
            }
            .square {
                width: 60px;
                height: 60px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 40px;
                transition: transform 0.2s ease;
            }
            .square:hover {
                transform: scale(1.05);
                z-index: 10;
            }
            .selected {
                background-color: #0000ff !important; /* Bauhaus Blue for selection */
                box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            }
            .valid-move {
                position: relative;
            }
            .valid-move::after {
                content: '';
                position: absolute;
                width: 15px;
                height: 15px;
                background-color: rgba(0, 0, 0, 0.3);
                border-radius: 50%;
            }
            .in-check {
                background-color: #ff0000 !important;
                animation: pulse-check 1s infinite alternate;
                box-shadow: inset 0 0 20px #000;
                z-index: 5;
            }
            @keyframes pulse-check {
                from { opacity: 1; }
                to { opacity: 0.6; }
            }
            
            /* Schaakmat animatie */
            .checkmate .piece-king .shape {
                animation: fall-apart 2s forwards ease-in-out;
            }
            
            .checkmate .piece-king .shape::after {
                animation: fly-away 2.5s forwards ease-in-out;
            }

            @keyframes fall-apart {
                0% { transform: scale(1) rotate(0); opacity: 1; }
                50% { transform: scale(1.2) rotate(45deg); opacity: 0.8; }
                100% { transform: scale(0) rotate(180deg) translate(50px, 50px); opacity: 0; }
            }

            @keyframes fly-away {
                0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                100% { transform: translate(150%, -250%) scale(0.5) rotate(720deg); opacity: 0; }
            }

            .white {
                background-color: #ffcc00; /* Bauhaus Yellow */
            }
            .black {
                background-color: #ff0000; /* Bauhaus Red */
            }
            .piece {
                width: 40px;
                height: 40px;
                display: flex;
                justify-content: center;
                align-items: center;
                cursor: pointer;
                user-select: none;
                transition: transform 0.2s;
                position: relative;
            }
            .white-piece .shape {
                background-color: #0000ff; /* Bauhaus Blue */
                border: 3px solid #000;
            }
            .black-piece .shape {
                background-color: #ffffff; /* White for Black pieces to contrast on Red/Yellow */
                border: 3px solid #000;
            }

            /* Geometrische vormen per stuk */
            /* Pion: Kleine Cirkel */
            .piece-pawn .shape {
                width: 20px;
                height: 20px;
                border-radius: 50%;
            }
            /* Toren: Vierkant */
            .piece-rook .shape {
                width: 30px;
                height: 30px;
            }
            /* Paard: L-vorm of rechthoek met schuine kant (hier: rechthoek) */
            .piece-knight .shape {
                width: 25px;
                height: 35px;
                clip-path: polygon(0% 0%, 70% 0%, 100% 30%, 100% 100%, 0% 100%);
            }
            /* Loper: Driehoek */
            .piece-bishop .shape {
                width: 0;
                height: 0;
                background-color: transparent !important;
                border: none !important;
                border-left: 20px solid transparent;
                border-right: 20px solid transparent;
                border-bottom: 38px solid #000; /* De zwarte rand */
                position: relative;
                margin-bottom: 10px; /* Compenseer voor de hoogte van de driehoek zodat deze gecentreerd oogt */
            }
            .piece-bishop .shape::before {
                content: '';
                position: absolute;
                top: 4px; /* Dikte van de rand aan de bovenkant */
                left: -16px; /* Gecentreerd ten opzichte van de 20px borders */
                border-left: 16px solid transparent;
                border-right: 16px solid transparent;
                border-bottom: 30px solid transparent; /* De vulkleur */
                z-index: 1;
            }
            .white-piece.piece-bishop .shape::before {
                border-bottom-color: #0000ff;
            }
            .black-piece.piece-bishop .shape::before {
                border-bottom-color: #ffffff;
            }
            /* Koningin: Grote cirkel */
            .piece-queen .shape {
                width: 35px;
                height: 35px;
                border-radius: 50%;
            }
            /* Koning: Grote vierkant met een kleiner vierkant erop */
            .piece-king .shape {
                width: 35px;
                height: 35px;
                position: relative;
            }
            .piece-king .shape::after {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 15px;
                height: 15px;
                background-color: inherit;
                border: 3px solid #000;
            }
            .square:hover .piece {
                transform: scale(1.2) rotate(5deg);
            }
            /* Verwijder de extra accenten om alleen rood en geel te behouden */
            /* Styling for the coordinates (if we add them later) */
            .board-container {
                position: relative;
                padding: 20px;
                background-color: #fff;
                border: 4px solid #000;
            }
            
            /* Layout voor bord en klok */
            .main-container {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 40px;
                position: relative;
                width: fit-content;
            }
            
            .clocks-container {
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                height: 520px; /* Overeenkomstig met de hoogte van het bord + padding */
            }
            
            .clock {
                width: 150px;
                padding: 20px;
                background-color: #fff;
                border: 6px solid #000;
                box-shadow: 10px 10px 0px #000;
                text-align: center;
                transition: all 0.3s ease;
            }
            
            /* Specifieke klok posities */
            #black-clock {
                margin-bottom: auto;
            }
            
            #white-clock {
                margin-top: auto;
            }
            
            .white-timer {
                border-color: #0000ff; /* Blauw voor wit's klok (Bauhaus kleur voor witte stukken) */
            }
            
            .black-timer {
                border-color: #000; /* Zwart voor zwart's klok */
            }
            
            .clock.active {
                transform: scale(1.1);
                box-shadow: 15px 15px 0px #ff0000; /* Rood accent voor actieve beurt */
            }
            
            .clock-label {
                font-size: 1.2rem;
                font-weight: bold;
                margin-bottom: 10px;
                border-bottom: 3px solid #000;
            }
            
            .time {
                font-size: 2.5rem;
                font-weight: bold;
            }
            
            /* Responsive aanpassing voor mobiel */
            @media (max-width: 900px) {
                .main-container {
                    flex-direction: column;
                }
                .clocks-container {
                    height: auto;
                    flex-direction: row;
                    gap: 20px;
                }
            }
            /* Startscherm Overlay */
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(240, 240, 240, 0.95);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            }

            .start-box {
                background-color: #fff;
                border: 10px solid #000;
                padding: 40px;
                box-shadow: 20px 20px 0px #ff0000;
                text-align: center;
            }

            .start-box h2 {
                margin-top: 0;
                font-size: 3rem;
            }

            .welcome-text {
                color: #ff0000;
                border-bottom: 6px solid #000;
                padding-bottom: 10px;
                margin-bottom: 20px !important;
            }

            .time-options {
                display: flex;
                gap: 20px;
                justify-content: center;
                margin-top: 30px;
            }

            .time-options button {
                padding: 15px 30px;
                font-size: 1.5rem;
                font-family: 'Archivo', sans-serif;
                font-weight: bold;
                background-color: #fff;
                border: 4px solid #000;
                cursor: pointer;
                transition: all 0.2s ease;
                text-transform: uppercase;
            }

            .time-options button:hover {
                transform: scale(1.1);
                box-shadow: 8px 8px 0px #0000ff;
                background-color: #ffcc00;
            }

            .time-options button:active {
                transform: scale(0.95);
            }
        </style>
    </head>
    <body>

    <div id="start-screen" class="overlay">
        <div class="start-box">
            <h2 class="welcome-text">WELKOM BIJ BAU-SCHAAK</h2>
            <h2>KIES TIJD</h2>
            <div class="time-options">
                <button onclick="startGame(1)">1 MIN</button>
                <button onclick="startGame(3)">3 MIN</button>
                <button onclick="startGame(5)">5 MIN</button>
                <button onclick="startGame(10)">10 MIN</button>
            </div>
        </div>
    </div>


    <div class="main-container">
        <div class="board-container">
            <div id="chessboard"></div>
        </div>

        <div class="clocks-container">
            <div id="black-clock" class="clock black-timer">
                <div class="clock-label">ZWART</div>
                <div class="time">10:00</div>
            </div>
            
            <div id="white-clock" class="clock white-timer active">
                <div class="clock-label">WIT</div>
                <div class="time">10:00</div>
            </div>
        </div>
    </div>

    <script src="chess.js"></script>
    </body>
</html>
